<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Items</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
    <link rel="manifest" href="/assets/site.webmanifest">
</head>
<body class="bg-slate-50 font-sans">
    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        <h1 class="text-3xl font-bold text-slate-800">Manage Items</h1>
        <div class="mt-6 bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
                <button type="button" class="px-4 py-2 bg-orange-600 text-white font-semibold rounded-md hover:bg-orange-700 transition-colors shadow" onclick="prepareAddItemModal()">
                    + Add New Item
                </button>
                <form action="/api/import-items-csv" method="post" enctype="multipart/form-data" class="flex items-center gap-3">
                    <label for="csv_file" class="text-sm font-medium text-slate-600">Import from CSV:</label>
                    <input type="file" name="csv_file" id="csv_file" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100" accept=".csv" required>
                    <button type="submit" class="px-4 py-2 bg-slate-600 text-white font-semibold rounded-md hover:bg-slate-700 transition-colors text-sm">Import</button>
                </form>
            </div>

            <div class="mt-6 overflow-x-auto">
                <table class="w-full text-sm text-left text-slate-500">
                    <thead class="text-xs text-slate-700 uppercase bg-slate-100">
                        <tr>
                            <th class="px-4 py-3">Item Code</th>
                            <th class="px-4 py-3">Name</th>
                            <th class="px-4 py-3">Type</th>
                            <th class="px-4 py-3">Price</th>
                            <th class="px-4 py-3">Styles</th>
                            <th class="px-4 py-3">Weight (oz)</th>
                            <th class="px-4 py-3 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="itemsTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4 hidden" id="itemModal">
        <div class="bg-white rounded-lg shadow-xl p-6 sm:p-8 w-full max-w-xl max-h-[90vh] overflow-y-auto" role="document">
            <div class="flex justify-between items-center pb-4 border-b border-slate-200">
                <h5 class="text-xl font-bold text-slate-800" id="itemModalLabel">Add Item</h5>
                <button type="button" class="p-1 text-slate-400 hover:text-slate-600" onclick="$('#itemModal').addClass('hidden')" aria-label="Close">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="mt-6">
                <form id="itemForm" class="space-y-4">
                    <input type="hidden" id="itemId">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                           <label for="itemCode" class="block text-sm font-medium text-slate-600">Item Code</label>
                            <input type="text" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-orange-500 focus:border-orange-500 sm:text-sm" id="itemCode" required>
                        </div>
                        <div>
                            <label for="itemName" class="block text-sm font-medium text-slate-600">Name</label>
                            <input type="text" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-orange-500 focus:border-orange-500 sm:text-sm" id="itemName" required>
                        </div>
                    </div>
                     <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="itemPrice" class="block text-sm font-medium text-slate-600">Price ($)</label>
                            <input type="number" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-orange-500 focus:border-orange-500 sm:text-sm" id="itemPrice" required min="0" step="0.01">
                        </div>
                         <div>
                            <label for="itemWeightOz" class="block text-sm font-medium text-slate-600">Weight (oz)</label>
                            <input type="number" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-orange-500 focus:border-orange-500 sm:text-sm" id="itemWeightOz" min="0" step="0.1">
                        </div>
                    </div>
                    <div>
                        <label for="itemType" class="block text-sm font-medium text-slate-600">Type</label>
                        <select class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-orange-500 focus:border-orange-500 sm:text-sm" id="itemType">
                            <option value="cross">Cross</option>
                            <option value="display">Display</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label for="itemStyles" class="block text-sm font-medium text-slate-600">Styles (comma-separated)</label>
                        <input type="text" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-orange-500 focus:border-orange-500 sm:text-sm" id="itemStyles">
                    </div>
                </form>
            </div>
            <div class="mt-6 pt-4 border-t border-slate-200 flex justify-end space-x-3">
                <button type="button" class="px-4 py-2 bg-slate-200 text-slate-700 font-semibold rounded-md hover:bg-slate-300 transition-colors" onclick="$('#itemModal').addClass('hidden')">Close</button>
                <button type="button" class="px-4 py-2 bg-orange-600 text-white font-semibold rounded-md hover:bg-orange-700 transition-colors" onclick="saveItem()">Save Item</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        $(document).ready(function() {
            loadItems();
        });

        function loadItems() {
            fetch('/api/items')
                .then(response => response.json())
                .then(data => {
                    const tableBody = $('#itemsTableBody');
                    tableBody.empty();
                    data.forEach(item => {
                        const priceFormatted = typeof item.price === 'number' ? (item.price / 100).toFixed(2) : 'N/A';
                        const stylesFormatted = Array.isArray(item.styles) ? item.styles.join(', ') : 'N/A';
                        const weightFormatted = typeof item.weight_oz === 'number' ? item.weight_oz : 'N/A';
                        const row = `
                            <tr class="bg-white border-b hover:bg-slate-50">
                                <td class="px-4 py-3 font-medium text-slate-800">${item.item_code || 'N/A'}</td>
                                <td class="px-4 py-3">${item.name || 'N/A'}</td>
                                <td class="px-4 py-3">${item.type || 'N/A'}</td>
                                <td class="px-4 py-3">$${priceFormatted}</td>
                                <td class="px-4 py-3">${stylesFormatted}</td>
                                <td class="px-4 py-3">${weightFormatted}</td>
                                <td class="px-4 py-3 text-center">
                                    <div class="flex items-center justify-center space-x-2">
                                        <button class="p-1 text-slate-500 hover:text-orange-600" onclick="prepareEditItemModal('${item.id}')">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z" /><path fill-rule="evenodd" d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" clip-rule="evenodd" /></svg>
                                        </button>
                                        <button class="p-1 text-slate-500 hover:text-red-600" onclick="deleteItem('${item.id}')">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm4 0a1 1 0 012 0v6a1 1 0 11-2 0V8z" clip-rule="evenodd" /></svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                        tableBody.append(row);
                    });
                })
                .catch(error => console.error('Error loading items:', error));
        }

        function prepareAddItemModal() {
            $('#itemModalLabel').text('Add New Item');
            $('#itemForm')[0].reset();
            $('#itemId').val('');
            $('#itemCode').prop('readonly', false);
            $('#itemModal').removeClass('hidden');
        }

        function prepareEditItemModal(itemIdOrCode) {
            fetch(`/api/items`)
                .then(response => response.json())
                .then(items => {
                    const item = items.find(i => i.id === itemIdOrCode || i.item_code === itemIdOrCode);
                    if (item) {
                        $('#itemModalLabel').text('Edit Item');
                        $('#itemId').val(item.id);
                        $('#itemCode').val(item.item_code || '');
                        $('#itemName').val(item.name || '');
                        $('#itemPrice').val(typeof item.price === 'number' ? (item.price / 100).toFixed(2) : '');
                        $('#itemType').val(item.type || 'cross');
                        $('#itemWeightOz').val(item.weight_oz || '');
                        $('#itemStyles').val(Array.isArray(item.styles) ? item.styles.join(', ') : '');
                        $('#itemModal').removeClass('hidden');
                    } else {
                        alert('Item not found for editing.');
                    }
                })
                .catch(error => console.error('Error fetching item for edit:', error));
        }

        function saveItem() {
            const itemId = $('#itemId').val();
            const itemData = {
                item_code: $('#itemCode').val().trim(),
                name: $('#itemName').val().trim(),
                price: parseFloat($('#itemPrice').val()),
                type: $('#itemType').val(),
                weight_oz: parseFloat($('#itemWeightOz').val()) || null,
                styles: $('#itemStyles').val().split(',').map(s => s.trim()).filter(s => s)
            };

            if (!itemData.item_code || !itemData.name || isNaN(itemData.price)) {
                alert('Item Code, Name, and a valid Price are required.');
                return;
            }
            if (isNaN(itemData.weight_oz)) { itemData.weight_oz = null; }

            let url = '/api/items';
            let method = 'POST';

            if (itemId) {
                url = `/api/items/${itemId}`;
                method = 'PUT';
                itemData.id = itemId;
            }

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(itemData),
            })
            .then(response => response.json().then(data => ({ status: response.status, body: data })))
            .then(result => {
                if (result.status === 200 || result.status === 201) {
                    $('#itemModal').addClass('hidden');
                    loadItems();
                    alert(result.body.message || 'Item saved successfully!');
                } else {
                    alert('Error saving item: ' + (result.body.message || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error('Error saving item:', error);
                alert('Error saving item. See console for details.');
            });
        }

        function deleteItem(itemIdOrCode) {
            if (!confirm('Are you sure you want to delete this item?')) { return; }

            fetch(`/api/items/${itemIdOrCode}`, { method: 'DELETE' })
            .then(response => response.json().then(data => ({ status: response.status, body: data })))
            .then(result => {
                if (result.status === 200) {
                    loadItems();
                    alert(result.body.message || 'Item deleted successfully!');
                } else {
                    alert('Error deleting item: ' + (result.body.message || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error('Error deleting item:', error);
                alert('Error deleting item. See console for details.');
            });
        }
    </script>
</body>
</html>
